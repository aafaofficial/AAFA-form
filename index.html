<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Fans Meet Registration</title>

  <style>
    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .container{
      text-align:center;
      color:white;
    }

    .logo{
      width:220px;
      max-width:80%;
      margin-bottom:20px;
      animation:zoom 1.2s ease-in-out infinite alternate;
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      opacity:0.8;
    }

    .loader{
      margin:25px auto 0;
      width:45px;
      height:45px;
      border:4px solid rgba(255,255,255,0.2);
      border-top:4px solid white;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @keyframes zoom{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.05);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Replace logo.png with your image name -->
    <img src="logo.png" class="logo" alt="Hero Logo">

    <h1>Please Fill The Registration Form</h1>

    <p>Redirecting...</p>

    <div class="loader"></div>

  </div>

<script>

  */

  };

    window.location.href = formLinks[activeForm];
  }, 2000);
  */

</script>

</body>
</html>
